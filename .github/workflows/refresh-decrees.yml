name: Refresh JO decree directory

# Keeps /outils/decret-naturalisation.html up to date with new naturalisation
# decrees, parsed from the DILA open data (echanges.dila.gouv.fr, no auth).
# Runs daily; only commits when a new decree is found.

on:
  schedule:
    - cron: "0 7 * * *"   # every day at 07:00 UTC (after the nightly JORF increment)
  workflow_dispatch: {}    # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-decrees
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update decree directory from DILA open data
        run: python scripts/update_decrees.py

      - name: Commit & push if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "decree-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/decrees.json outils/decret-naturalisation.html
            git commit -m "chore(decret): auto-refresh JO decree directory"
            git push
            echo "Directory updated."
          else
            echo "No new decrees — nothing to commit."
          fi
